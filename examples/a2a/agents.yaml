# Example agent binding manifest for A2A Contract Watch.
# Spec: docs/PRODUCT-ROADMAP.md § Agent binding manifest
version: 1
agents:
  - id: billing-refund-v3
    slug: billing-refund-v3
    environment: staging
    policy: staging-strict
    a2a:
      cardUrl: https://billing-agent.example/.well-known/agent.json
    mcp:
      configPath: .cursor/mcp.json
      skillToolMap:
        process_refund:
          - stripe_refund
    watches:
      - type: a2a_card
        url: https://billing-agent.example/.well-known/agent.json
      - type: mcp
        url: https://mcp.example.com/sse
