# Singapore / MGFA-oriented harness profile (E22 example)
# Copy to your repo as .driftguard/gates.yaml — adjust advisory flags per gate maturity.
# See docs/guides/singapore-agent-deployment-checklist.md
version: 1
gates:
  mockdrift:
    enabled: true
    advisory: false
  fuseguard:
    enabled: true
    max_tool_calls: 40
  agents_lint:
    enabled: true
  toolchange:
    enabled: true
    advisory: true   # Gate 3A alpha — set false when tools.json + baseline are committed (see harness.lock manifests.toolchange)
  schemasync:
    enabled: true
    advisory: true   # set false when prompts + removed-fields are committed (see harness.lock manifests.schemasync)
  evaluator:
    enabled: true
    advisory: false
defaults:
  failure_profile: bubble_to_orchestrator
  runner: langgraph
