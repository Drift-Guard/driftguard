  #     - name: Run partner conformance harness (replace command)
  #       run: mcp-conformance run --file tests/mcp-tools.json --server http://127.0.0.1:8000/mcp

  mcp-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Drift-Guard/driftguard/.github/actions/mcp-lockfile@v0.3.3
        with:
          lockfile: driftguard-lock.json
          fail-on: breaking
