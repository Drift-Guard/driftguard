# Copy to `.github/workflows/mcp-conformance.yml` in your MCP server repo.
# Guides: docs/guides/mcp-conformance-partners.md · docs/guides/mcp-lockfile-bridge.md

name: MCP conformance (stub)

on:
  pull_request:
  push:
    branches: [main]

jobs:
