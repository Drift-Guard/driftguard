# Example: CI funnel — free preview (hook) + optional paid gate
# Recommended: examples/workflows/driftguard-starter.yml (all-in-one)

name: DriftGuard coverage preview

on:
  pull_request:
    paths:
      - "mcp.json"
      - ".cursor/mcp.json"
      - "package.json"

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kioie/driftguard/.github/actions/drift-coverage-preview@v0.3.3
        with:
          scan-paths: mcp.json,.cursor/mcp.json,package.json

