# Example: CI funnel — free preview (hook) + optional paid gate
# Step 1: add drift-diff (see drift-diff.yml)
# Step 2: add this preview job — does NOT block until you opt in

name: DriftGuard coverage preview

on:
  pull_request:
    paths:
      - "mcp.json"
      - ".cursor/mcp.json"
      - "package.json"

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build scan payload
        id: scan
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const paths = ['mcp.json', '.cursor/mcp.json', 'package.json'].filter((p) => fs.existsSync(p));
          if (!paths.length) process.exit(0);
          const files = paths.map((path) => ({ path, content: fs.readFileSync(path, 'utf8') }));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `files-json=${JSON.stringify(files)}\n`);
          NODE
      - uses: kioie/driftguard/.github/actions/drift-coverage-preview@v0.3.2
        if: steps.scan.outputs.files-json != ''
        with:
          files-json: ${{ steps.scan.outputs.files-json }}

