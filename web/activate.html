<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate — DriftGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Instrument Sans', sans-serif; background: #0a0f14; color: #e8eef4; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #111922; border: 1px solid #1e2a38; border-radius: 14px; padding: 2rem; max-width: 480px; width: 90%; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #8fa3b8; font-size: 0.95rem; }
    input { width: 100%; padding: 0.75rem; margin: 1rem 0; border-radius: 8px; border: 1px solid #1e2a38; background: #060a0e; color: #e8eef4; font-size: 1rem; }
    button { width: 100%; padding: 0.85rem; background: #3dd68c; color: #041008; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    pre { background: #060a0e; padding: 1rem; border-radius: 8px; overflow-x: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; margin-top: 1rem; word-break: break-all; white-space: pre-wrap; }
    .error { color: #ff6b6b; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Get your API key</h1>
    <p>Enter the email you used at checkout. Your key activates hosted Pro/Team limits.</p>
    <input type="email" id="email" placeholder="you@company.com" />
    <button onclick="claim()">Retrieve API key</button>
    <div id="result"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('email')) document.getElementById('email').value = params.get('email');

    async function claim() {
      const email = document.getElementById('email').value;
      const result = document.getElementById('result');
      result.innerHTML = '';
      try {
        const r = await fetch('/api/billing/claim', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await r.json();
        if (!r.ok) {
          result.innerHTML = '<p class="error">' + data.error + '</p>';
          return;
        }
        result.innerHTML = '<p>Plan: <strong>' + data.plan + '</strong></p><pre>' + data.apiKey + '</pre><p style="color:#8fa3b8;font-size:0.85rem;margin-top:0.5rem">' + data.usage + '</p>';
      } catch (e) {
        result.innerHTML = '<p class="error">Request failed. Try again.</p>';
      }
    }
  </script>
</body>
</html>
