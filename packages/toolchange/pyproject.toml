[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "toolchange"
version = "0.1.0"
description = "Manifest-first tool schema CI security lint (DriftGuard Platform Gate 3)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
toolchange = "toolchange.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["toolchange"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "unit: fast isolated unit test",
]
