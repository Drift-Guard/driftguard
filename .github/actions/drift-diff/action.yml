name: DriftGuard JSON Diff
description: Fail the job on breaking JSON schema changes (offline, no API key)
inputs:
  before:
    description: JSON string — previous payload or fixture
    required: true
  after:
    description: JSON string — new payload or fixture
    required: true
  version:
    description: DriftGuard client semver (optional; defaults from action ref tag v*)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-driftguard
      with:
        version: ${{ inputs.version }}
    - shell: bash
      run: |
        set -euo pipefail
        BEFORE='${{ inputs.before }}'
        AFTER='${{ inputs.after }}'
        driftguard diff "$BEFORE" "$AFTER"
