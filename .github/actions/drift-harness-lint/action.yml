name: DriftGuard harness bundle lint
description: Validate .driftguard gates.yaml, harness.lock, and optional agents.yaml (offline)
branding:
  icon: file-code
  color: purple
inputs:
  bundle:
    description: Path to harness bundle directory
    required: false
    default: ".driftguard"
  version:
    description: DriftGuard client semver when using published CLI (optional)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - shell: bash
      env:
        BUNDLE: ${{ inputs.bundle }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        REPO_ROOT="$(cd "${{ github.action_path }}/../.." && pwd)"
        if [ -f "$REPO_ROOT/package.json" ] && [ "$(node -p "require('$REPO_ROOT/package.json').name" 2>/dev/null || echo '')" = "@driftguard/driftguard" ]; then
          echo "Linting harness bundle from action source (${{ github.action_ref }})..."
          cd "$REPO_ROOT"
          npm ci
          npm run build
          node dist/cli/check.js lint-harness "$BUNDLE"
          exit $?
        fi
        echo "Installing DriftGuard CLI for harness lint..."
        uses_setup="${{ github.action_path }}/../setup-driftguard/install.sh"
        bash "$uses_setup" "$INPUT_VERSION"
        driftguard lint-harness "$BUNDLE"
