name: DriftGuard Coverage Preview
description: Free CI scan — discover unmonitored endpoints, print console upgrade links (does not block by default)
inputs:
  files-json:
    description: JSON array of {path, content} objects to scan
    required: true
  version:
    description: DriftGuard client semver (optional)
    required: false
    default: ""
  fail-on-missing:
    description: Fail the job when unmonitored endpoints are found (default false — hook mode)
    required: false
    default: "false"
  repo:
    description: Repository slug for console deep link (defaults to GITHUB_REPOSITORY)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-driftguard
      with:
        version: ${{ inputs.version }}
    - shell: bash
      env:
        DRIFTGUARD_FILES_JSON: ${{ inputs.files-json }}
        DRIFTGUARD_FAIL_ON_MISSING: ${{ inputs.fail-on-missing == 'true' && '1' || '0' }}
        DRIFTGUARD_CI_REPO: ${{ inputs.repo }}
      run: driftguard coverage-preview
