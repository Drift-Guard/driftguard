name: DriftGuard Coverage Assert
description: Fail CI if repo dependencies are not covered by hosted DriftGuard watches (Pro/Team)
inputs:
  api-key:
    description: DriftGuard Pro/Team API key (dg_…)
    required: true
  files-json:
    description: JSON array of {path, content} objects to scan (e.g. mcp.json, package.json)
    required: true
  api:
    description: Hosted API base URL override
    required: false
    default: ""
  version:
    description: DriftGuard client semver (optional; defaults from action ref tag v*)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-driftguard
      with:
        version: ${{ inputs.version }}
    - shell: bash
      env:
        DRIFTGUARD_API_KEY: ${{ inputs.api-key }}
        DRIFTGUARD_FILES_JSON: ${{ inputs.files-json }}
        DRIFTGUARD_API: ${{ inputs.api }}
      run: driftguard assert-coverage
