name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack npm tarball
        run: npm pack --pack-destination dist/
      - name: Create source bundle
        run: |
          mkdir -p dist/bundle
          cp -r dist/cli dist/mcp dist/bundle/
          cp package.json README.md LICENSE AGENTS.md SYSTEM_PROMPT.md server.json dist/bundle/
          cp -r examples dist/bundle/
          tar -czf "dist/driftguard-${GITHUB_REF_NAME}-bundle.tar.gz" -C dist/bundle .
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: driftguard-release
          path: |
            dist/*.tgz
            dist/*.tar.gz

  github-release:
    name: GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: driftguard-release
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: github-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
