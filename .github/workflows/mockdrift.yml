name: MockDrift

on:
  push:
    branches: [main]
    paths:
      - "packages/mockdrift/**"
      - "docs/mockdrift/**"
      - ".github/workflows/mockdrift.yml"
      - ".github/actions/mockdrift/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/mockdrift/**"
      - "docs/mockdrift/**"
      - ".github/workflows/mockdrift.yml"
      - ".github/actions/mockdrift/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mockdrift
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/mockdrift/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_unit_*.py tests/test_decorator_contract.py -v --tb=short

  integration:
    name: Layer 1 + Layer 2 + reference
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mockdrift
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/mockdrift/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_layer1.py tests/test_layer2.py tests/test_phase1c.py examples/reference_langgraph/tests/ -v --tb=short

  full:
    name: Full suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mockdrift
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/mockdrift/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -v --tb=short
      - run: mockdrift demo stripe-required-field

  matrix:
    name: Unit (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/mockdrift
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_unit_*.py tests/test_decorator_contract.py -q
