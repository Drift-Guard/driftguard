name: OpenRouter PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: openrouter-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - '.github/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'

  review:
    needs: [changes]
    if: |
      always() && (
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '/review') &&
          github.event.comment.user.type != 'Bot'
        ) || (
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          github.event.pull_request.head.repo.fork == false &&
          needs.changes.outputs.code == 'true'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Run OpenRouter review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          ADDITIONAL_CONTEXT: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
        run: bash .github/scripts/openrouter-pr-review.sh
