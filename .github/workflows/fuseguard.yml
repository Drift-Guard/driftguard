name: FuseGuard

on:
  push:
    branches: [main]
    paths:
      - "packages/fuseguard/**"
      - "packages/mockdrift/mockdrift/loop_detect.py"
      - "extensions/fuseguard-vscode/**"
      - ".github/workflows/fuseguard.yml"
      - ".github/workflows/fuse-policy-design-time.yml"
      - ".github/actions/drift-fuse-policy-lint/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/fuseguard/**"
      - "packages/mockdrift/mockdrift/loop_detect.py"
      - "extensions/fuseguard-vscode/**"
      - ".github/workflows/fuseguard.yml"
      - ".github/workflows/fuse-policy-design-time.yml"
      - ".github/actions/drift-fuse-policy-lint/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Phase 2A tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/fuseguard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            packages/fuseguard/pyproject.toml
            packages/mockdrift/pyproject.toml
      - run: pip install -e "../mockdrift" -e ".[dev]"
      - run: pytest tests/ -v --tb=short
      - name: OSS IP boundary audit
        working-directory: .
        run: bash scripts/audit-oss-boundary.sh
