# Usage in your repo:
#
# jobs:
#   openapi:
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#         with:
#           fetch-depth: 0
#       - uses: kioie/driftguard/.github/actions/openapi-drift@main
#         with:
#           spec-path: openapi.yaml

name: OpenAPI Drift (example)

on:
  pull_request:
    paths:
      - '**.yaml'
      - '**.yml'
      - '**.json'

jobs:
  example:
    runs-on: ubuntu-latest
    if: false  # disabled — copy to your own repo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/openapi-drift
        with:
          spec-path: openapi.yaml
