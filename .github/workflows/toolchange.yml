name: ToolChange

on:
  push:
    branches: [main]
    paths:
      - "packages/toolchange/**"
      - ".github/workflows/toolchange.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/toolchange/**"
      - ".github/workflows/toolchange.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Phase 3A tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/toolchange
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/toolchange/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short
