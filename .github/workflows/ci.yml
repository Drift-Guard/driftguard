name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:agents-yaml
      - name: Tests & coverage threshold
        env:
          SKIP_NPM_CI: "1"
        run: bash .github/scripts/check-coverage.sh 60
      - name: npm audit (production)
        run: npm audit --audit-level=high --omit=dev
      - name: Drift detection smoke
        if: github.event_name == 'pull_request'
        run: |
          BEFORE='{"status":"ok","data":{"id":1,"name":"test"}}'
          AFTER='{"status":"ok","data":{"id":1}}'
          RESULT=$(node dist/cli/check.js diff "$BEFORE" "$AFTER" 2>/dev/null || true)
          echo "$RESULT" | grep -q '"breakingCount": 1'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  action-smoke:
    name: CI action smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci && npm run build
      - uses: ./.github/actions/setup-driftguard
      - run: test "$(driftguard version)" = "0.3.3"
      - name: drift-diff action fails on breaking change
        uses: ./.github/actions/drift-diff
        with:
          before: '{"a":1}'
          after: '{"a":1,"b":2}'
        continue-on-error: true
        id: breaking
      - run: test "${{ steps.breaking.outcome }}" = "failure"
      - name: drift-agents-lint action accepts example manifest
        uses: ./.github/actions/drift-agents-lint
        with:
          manifest: examples/a2a/agents.yaml
