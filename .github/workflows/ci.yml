name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  build:
    name: Release build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify CLI diff exit codes
        run: |
          node dist/cli/check.js diff '{"a":1}' '{"a":1}'
          set +e
          node dist/cli/check.js diff '{"a":1}' '{"a":1,"b":2}'
          code=$?
          set -e
          test "$code" -eq 1
      - name: Verify MCP bundle loads
        run: node -e "import('./dist/mcp/server.js').then(() => console.log('mcp ok'))"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check coverage threshold (src/core + src/mcp)
        run: bash .github/scripts/check-coverage.sh 60
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  drift-check:
    name: Drift smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Check for API response fixture drift
        run: |
          npm ci && npm run build
          BEFORE='{"status":"ok","data":{"id":1,"name":"test"}}'
          AFTER='{"status":"ok","data":{"id":1}}'
          RESULT=$(node dist/cli/check.js diff "$BEFORE" "$AFTER" 2>/dev/null || true)
          echo "$RESULT"
          echo "$RESULT" | grep -q '"breakingCount": 1' && echo "Drift detection working"

  action-smoke:
    name: CI action smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: ./.github/actions/setup-driftguard
        id: dg
      - run: test "$(driftguard version)" = "0.3.1"
      - name: drift-diff action fails on breaking change
        uses: ./.github/actions/drift-diff
        with:
          before: '{"a":1}'
          after: '{"a":1,"b":2}'
        continue-on-error: true
        id: breaking
      - run: test "${{ steps.breaking.outcome }}" = "failure"
