name: FG PR labels

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply fg-test labels from diff
        id: apply
        env:
          GH_TOKEN: ${{ github.token }}
          FG_LABEL_REPO: oss
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"
          LABELS="$(printf '%s\n' "$FILES" | node scripts/fg-pr-label-from-diff.mjs)"
          {
            echo "computed<<EOF"
            echo "$LABELS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          while IFS= read -r label; do
            [[ -n "$label" ]] || continue
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "$label" || true
          done <<< "$LABELS"
      - name: Require at least one fg-test/* label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_LABELS="$(gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name')"
          COMBINED="${PR_LABELS}"$'\n'"${{ steps.apply.outputs.computed }}"
          if ! grep -q '^fg-test/' <<< "$COMBINED"; then
            echo "::error::PR must have at least one fg-test/* label (see docs/FG-PR-LABELS.md)"
            exit 1
          fi
