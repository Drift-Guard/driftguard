name: FG PR labels

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Apply fg-test labels from diff
        env:
          GH_TOKEN: ${{ github.token }}
          FG_LABEL_REPO: oss
        run: |
          FILES="$(gh pr diff "${{ github.event.pull_request.number }}" --name-only)"
          while IFS= read -r label; do
            [[ -n "$label" ]] || continue
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "$label" || true
          done < <(printf '%s\n' "$FILES" | node scripts/fg-pr-label-from-diff.mjs)
      - name: Require at least one fg-test/* label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS="$(gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name')"
          if ! grep -q '^fg-test/' <<< "$LABELS"; then
            echo "::error::PR must have at least one fg-test/* label (see docs/FG-PR-LABELS.md)"
            exit 1
          fi
