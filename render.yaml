services:
  - type: web
    name: driftguard
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CRON_SECRET
        generateValue: true
    disk:
      name: driftguard-data
      mountPath: /data
      sizeGB: 1
